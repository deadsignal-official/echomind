<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EchoMind</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0ff;
    font-family: system-ui, sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 20px;
    background: #12121a;
    border-bottom: 1px solid #2a2a4a;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #6c63ff, #ff6584);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  header h1 { font-size: 20px; font-weight: 700; }
  header span { font-size: 12px; color: #6c63ff; }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .user {
    align-self: flex-end;
    background: #6c63ff;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .ai {
    align-self: flex-start;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-bottom-left-radius: 4px;
  }
  .thinking {
    align-self: flex-start;
    color: #6c63ff;
    font-size: 13px;
    font-style: italic;
    padding: 4px 8px;
  }
  #inputArea {
    padding: 12px 16px;
    background: #12121a;
    border-top: 1px solid #2a2a4a;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #userInput {
    flex: 1;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    color: #e0e0ff;
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 15px;
    resize: none;
    max-height: 120px;
    outline: none;
  }
  #sendBtn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #6c63ff, #ff6584);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
  }
  #apiSetup {
    position: fixed; inset: 0;
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    gap: 20px;
    z-index: 99;
  }
  #apiSetup h2 { font-size: 24px; text-align: center; }
  #apiSetup p { color: #888; text-align: center; font-size: 14px; }
  #apiKeyInput {
    width: 100%;
    background: #1a1a2e;
    border: 1px solid #6c63ff;
    color: #e0e0ff;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 15px;
    outline: none;
  }
  #saveKeyBtn {
    width: 100%;
    background: linear-gradient(135deg, #6c63ff, #ff6584);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 16px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- API Key Setup Scherm -->
<div id="apiSetup">
  <div style="font-size:48px">🧠</div>
  <h2>Welkom bij EchoMind</h2>
  <p>Voer je Groq API key in om te beginnen. Hij wordt alleen lokaal opgeslagen op jouw apparaat.</p>
  <input id="apiKeyInput" type="password" placeholder="gsk_..." />
  <button id="saveKeyBtn">EchoMind Activeren →</button>
</div>

<!-- Hoofd Chat -->
<header>
  <div class="logo">🧠</div>
  <div>
    <h1>EchoMind</h1>
    <span>● Online</span>
  </div>
</header>

<div id="chat"></div>

<div id="inputArea">
  <textarea id="userInput" rows="1" placeholder="Zeg iets..."></textarea>
  <button id="sendBtn">↑</button>
</div>

<script>
const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
const MODEL = "llama-3.3-70b-versatile";

// Memory & Personality
let memory = JSON.parse(localStorage.getItem("echomind_memory") || "[]");
let apiKey = localStorage.getItem("echomind_key") || "";

const SYSTEM_PROMPT = `Je bent EchoMind — een persoonlijke AI die totaal anders is dan andere AI's.
Je bent direct, eerlijk, en je leert de gebruiker echt kennen.
Je onthoudt alles wat ze je vertellen. Je past je taal aan op hoe zij praten.
Je bent nooit saai of formeel. Je denkt mee, je pusht grenzen.
Dit is wat je weet over de gebruiker tot nu toe:
${memory.map(m => m.fact).join("\n") || "Nog niets — dit is het eerste gesprek."}`;

// Setup screen
document.getElementById("saveKeyBtn").onclick = () => {
  const key = document.getElementById("apiKeyInput").value.trim();
  if (!key.startsWith("gsk_")) {
    alert("Dat ziet er niet uit als een Groq key. Hij begint met gsk_");
    return;
  }
  localStorage.setItem("echomind_key", key);
  apiKey = key;
  document.getElementById("apiSetup").style.display = "none";
  addMsg("ai", "Hey. Ik ben EchoMind. Ik ben niet zoals andere AI's — ik leer jou kennen. Vertel me iets over jezelf.");
};

if (apiKey) {
  document.getElementById("apiSetup").style.display = "none";
  addMsg("ai", "Hey, welkom terug. Waar waren we gebleven?");
}

// Chat history voor context
let chatHistory = [];

function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.textContent = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
  return div;
}

async function send() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text || !apiKey) return;
  input.value = "";
  input.style.height = "auto";

  addMsg("user", text);
  chatHistory.push({ role: "user", content: text });

  const thinking = document.createElement("div");
  thinking.className = "thinking";
  thinking.textContent = "EchoMind denkt na...";
  document.getElementById("chat").appendChild(thinking);

  try {
    const res = await fetch(GROQ_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: "system", content: SYSTEM_PROMPT },
          ...chatHistory.slice(-10)
        ],
        max_tokens: 1024,
        temperature: 0.85
      })
    });

    const data = await res.json();
    thinking.remove();

    if (data.error) {
      addMsg("ai", "❌ Fout: " + data.error.message);
      return;
    }

    const reply = data.choices[0].message.content;
    chatHistory.push({ role: "assistant", content: reply });
    addMsg("ai", reply);

    // Sla feiten op uit het gesprek
    extractAndSaveMemory(text);

  } catch(e) {
    thinking.remove();
    addMsg("ai", "❌ Kon geen verbinding maken. Check je internet.");
  }
}

function extractAndSaveMemory(userText) {
  // Simpele memory: sla elke user bericht op als feit (later maken we dit slimmer)
  if (userText.length > 20) {
    memory.push({ fact: userText, date: new Date().toLocaleDateString("nl") });
    if (memory.length > 50) memory.shift(); // max 50 herinneringen
    localStorage.setItem("echomind_memory", JSON.stringify(memory));
  }
}

// Send via knop
document.getElementById("sendBtn").onclick = send;

// Enter = send, Shift+Enter = nieuwe regel
document.getElementById("userInput").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

// Auto-resize textarea
document.getElementById("userInput").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});
</script>
</body>
</html>
