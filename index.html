<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EchoMind</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0ff;
    font-family: system-ui, sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 20px;
    background: #12121a;
    border-bottom: 1px solid #2a2a4a;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #6c63ff, #ff6584);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  header h1 { font-size: 20px; font-weight: 700; }
  header span { font-size: 12px; color: #6c63ff; }
  #memoryBtn {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    color: #6c63ff;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .user {
    align-self: flex-end;
    background: #6c63ff;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .ai {
    align-self: flex-start;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-bottom-left-radius: 4px;
  }
  .thinking {
    align-self: flex-start;
    color: #6c63ff;
    font-size: 13px;
    font-style: italic;
    padding: 4px 8px;
  }
  #inputArea {
    padding: 12px 16px;
    background: #12121a;
    border-top: 1px solid #2a2a4a;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #userInput {
    flex: 1;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    color: #e0e0ff;
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 15px;
    resize: none;
    max-height: 120px;
    outline: none;
  }
  #sendBtn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #6c63ff, #ff6584);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
  }
  /* Memory Panel */
  #memoryPanel {
    display: none;
    position: fixed;
    inset: 0;
    background: #0a0a0f;
    z-index: 50;
    flex-direction: column;
  }
  #memoryPanel.open { display: flex; }
  .panel-header {
    padding: 16px 20px;
    background: #12121a;
    border-bottom: 1px solid #2a2a4a;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-header h2 { font-size: 18px; }
  #closeMemory {
    background: none;
    border: none;
    color: #888;
    font-size: 24px;
    cursor: pointer;
  }
  #memoryList {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .memory-item {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-left: 3px solid #6c63ff;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .memory-item span { color: #888; font-size: 11px; margin-top: 2px; }
  .del-btn {
    background: none;
    border: none;
    color: #ff6584;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .empty-memory {
    text-align: center;
    color: #444;
    margin-top: 60px;
    font-size: 15px;
  }
  /* API Setup */
  #apiSetup {
    position: fixed; inset: 0;
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    gap: 20px;
    z-index: 99;
  }
  #apiSetup h2 { font-size: 24px; text-align: center; }
  #apiSetup p { color: #888; text-align: center; font-size: 14px; }
  #apiKeyInput {
    width: 100%;
    background: #1a1a2e;
    border: 1px solid #6c63ff;
    color: #e0e0ff;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 15px;
    outline: none;
  }
  #saveKeyBtn {
    width: 100%;
    background: linear-gradient(135deg, #6c63ff, #ff6584);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 16px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- API Key Setup -->
<div id="apiSetup">
  <div style="font-size:48px">🧠</div>
  <h2>Welkom bij EchoMind</h2>
  <p>Voer je Groq API key in. Hij wordt alleen lokaal op jouw apparaat opgeslagen.</p>
  <input id="apiKeyInput" type="password" placeholder="gsk_..." />
  <button id="saveKeyBtn">EchoMind Activeren →</button>
</div>

<!-- Memory Panel -->
<div id="memoryPanel">
  <div class="panel-header">
    <h2>🧠 Wat EchoMind weet</h2>
    <button id="closeMemory">✕</button>
  </div>
  <div id="memoryList"></div>
</div>

<!-- Hoofd Chat -->
<header>
  <div class="header-left">
    <div class="logo">🧠</div>
    <div>
      <h1>EchoMind</h1>
      <span id="statusDot">● Online</span>
    </div>
  </div>
  <button id="memoryBtn">Geheugen 💭</button>
</header>

<div id="chat"></div>

<div id="inputArea">
  <textarea id="userInput" rows="1" placeholder="Zeg iets..."></textarea>
  <button id="sendBtn">↑</button>
</div>

<script>
const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
const MODEL = "llama-3.3-70b-versatile";

let memory = JSON.parse(localStorage.getItem("echomind_memory") || "[]");
let apiKey = localStorage.getItem("echomind_key") || "";
let chatHistory = [];

function getSystemPrompt() {
  const memFacts = memory.length > 0
    ? memory.map(m => `- ${m.fact}`).join("\n")
    : "Nog niets bekend over de gebruiker.";
  return `Je bent EchoMind — een persoonlijke AI die de gebruiker echt leert kennen.
Je bent direct, scherp, eerlijk en nooit saai of formeel.
Je past je taal aan op hoe de gebruiker praat.
Je onthoudt alles en verwijst ernaar als het relevant is.
Je pusht grenzen en denkt actief mee.

Wat je al weet over de gebruiker:
${memFacts}`;
}

// --- API Setup ---
document.getElementById("saveKeyBtn").onclick = () => {
  const key = document.getElementById("apiKeyInput").value.trim();
  if (!key.startsWith("gsk_")) {
    alert("Dat ziet er niet uit als een Groq key. Hij begint met gsk_");
    return;
  }
  localStorage.setItem("echomind_key", key);
  apiKey = key;
  document.getElementById("apiSetup").style.display = "none";
  addMsg("ai", "Hey. Ik ben EchoMind.\n\nIk ben niet zoals andere AI's — ik leer jou echt kennen en onthoud alles wat je me vertelt. Vertel me iets over jezelf.");
};

if (apiKey) {
  document.getElementById("apiSetup").style.display = "none";
  const memCount = memory.length;
  addMsg("ai", `Welkom terug. Ik heb nog ${memCount} ${memCount === 1 ? "herinnering" : "herinneringen"} van jou opgeslagen. Waar wil je het over hebben?`);
}

// --- Memory Panel ---
document.getElementById("memoryBtn").onclick = openMemoryPanel;
document.getElementById("closeMemory").onclick = () => {
  document.getElementById("memoryPanel").classList.remove("open");
};

function openMemoryPanel() {
  const list = document.getElementById("memoryList");
  list.innerHTML = "";
  if (memory.length === 0) {
    list.innerHTML = `<div class="empty-memory">Nog geen herinneringen.<br>Vertel EchoMind iets over jezelf!</div>`;
  } else {
    memory.slice().reverse().forEach((m, i) => {
      const realIndex = memory.length - 1 - i;
      const div = document.createElement("div");
      div.className = "memory-item";
      div.innerHTML = `
        <div>
          <div>${m.fact}</div>
          <span>${m.date || ""}</span>
        </div>
        <button class="del-btn" onclick="deleteMemory(${realIndex})">✕</button>
      `;
      list.appendChild(div);
    });
  }
  document.getElementById("memoryPanel").classList.add("open");
}

function deleteMemory(index) {
  memory.splice(index, 1);
  localStorage.setItem("echomind_memory", JSON.stringify(memory));
  openMemoryPanel();
}

// --- Chat ---
function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.textContent = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
  return div;
}

async function send() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text || !apiKey) return;
  input.value = "";
  input.style.height = "auto";

  addMsg("user", text);
  chatHistory.push({ role: "user", content: text });

  const thinking = document.createElement("div");
  thinking.className = "thinking";
  thinking.textContent = "EchoMind denkt na...";
  document.getElementById("chat").appendChild(thinking);
  document.getElementById("chat").scrollTop = 999999;

  try {
    // Hoofdantwoord
    const res = await fetch(GROQ_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: "system", content: getSystemPrompt() },
          ...chatHistory.slice(-12)
        ],
        max_tokens: 1024,
        temperature: 0.85
      })
    });

    const data = await res.json();
    thinking.remove();

    if (data.error) {
      addMsg("ai", "❌ Fout: " + data.error.message);
      return;
    }

    const reply = data.choices[0].message.content;
    chatHistory.push({ role: "assistant", content: reply });
    addMsg("ai", reply);

    // Slim geheugen: laat AI feiten extraheren op de achtergrond
    extractMemoryWithAI(text);

  } catch(e) {
    thinking.remove();
    addMsg("ai", "❌ Kon geen verbinding maken. Check je internet.");
  }
}

async function extractMemoryWithAI(userText) {
  if (userText.length < 15) return; // te kort om feiten uit te halen

  try {
    const res = await fetch(GROQ_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [{
          role: "user",
          content: `Analyseer deze zin van een gebruiker en extraheer persoonlijke feiten die de moeite waard zijn om te onthouden (naam, hobby's, werk, locatie, voorkeuren, doelen, etc).

Zin: "${userText}"

Antwoord ALLEEN met een JSON array van strings. Maximaal 3 feiten. Als er geen persoonlijke feiten in zitten, antwoord dan met een lege array [].
Voorbeeld output: ["Gebruiker heet Dani", "Gebruiker maakt games in UE5"]
Geen uitleg, geen markdown, alleen de JSON array.`
        }],
        max_tokens: 200,
        temperature: 0.3
      })
    });

    const data = await res.json();
    const raw = data.choices?.[0]?.message?.content?.trim();
    if (!raw) return;

    const facts = JSON.parse(raw);
    if (!Array.isArray(facts)) return;

    facts.forEach(fact => {
      if (typeof fact === "string" && fact.length > 5) {
        // Voorkom duplicaten
        const exists = memory.some(m =>
          m.fact.toLowerCase().includes(fact.toLowerCase().slice(0, 20))
        );
        if (!exists) {
          memory.push({ fact, date: new Date().toLocaleDateString("nl") });
        }
      }
    });

    if (memory.length > 80) memory = memory.slice(-80);
    localStorage.setItem("echomind_memory", JSON.stringify(memory));

    // Update geheugen knop
    document.getElementById("memoryBtn").textContent = `Geheugen 💭 ${memory.length}`;

  } catch(e) {
    // Stil falen — geheugen extractie is optioneel
  }
}

// Update knop bij start
if (memory.length > 0) {
  document.getElementById("memoryBtn").textContent = `Geheugen 💭 ${memory.length}`;
}

// --- Input handlers ---
document.getElementById("sendBtn").onclick = send;

document.getElementById("userInput").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

document.getElementById("userInput").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});
</script>
</body>
</html>
